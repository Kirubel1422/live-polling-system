version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: live-polling-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: live_polling
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d live_polling"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./live-polling-backend
      dockerfile: Dockerfile
    container_name: live-polling-backend
    ports:
      - "5000:5000"
    environment:
      - APP_PORT=5000
      - NODE_ENV=dev
      - CLIENT_URL=http://localhost:5173
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=live_polling
      - DB_PASSWORD=postgres
      - DB_NAME=live_polling
      - JWT_SECRET=testsecret123
      - JWT_EXPIRES_IN=7d
      - COOKIE_SECRET=cookiesecret123
      - COOKIE_DOMAIN=localhost
      - AI_MODEL_NAME=openrouter/owl-alpha
      # Uncomment and add your OpenRouter key to test AI generation
      # - AI_API_KEY=your_openrouter_api_key
      # OAuth - Google
      # - GOOGLE_CLIENT_ID=yourgoogleclientid
      # - GOOGLE_CLIENT_SECRET=yourgoogleclientsecret
      # OAuth - GitHub
      # - GITHUB_CLIENT_ID=yourgithubclientid
      # - GITHUB_CLIENT_SECRET=yourgithubclientsecret
      # Cloudinary
      # - CLOUDINARY_CLOUD_NAME=yourcloudinarycloudname
      # - CLOUDINARY_API_KEY=yourcloudinaryapikey
      # - CLOUDINARY_API_SECRET=yourcloudinaryapsecret
      # Mail delivery
      # - SMTP_HOST=yoursmtphost
      # - SMTP_PORT=yoursmtpport
      # - SMTP_USER=yoursmtpuser
      # - SMTP_PASS=yoursmtppass
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./live-polling-backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./live-polling-frontend
      dockerfile: Dockerfile
    container_name: live-polling-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./live-polling-frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
